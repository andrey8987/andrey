<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testogram</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#7c3aed;
    --bg:#0f0f17;
    --card:#171726;
    --text:#f2f2f7;
    --border:rgba(255,255,255,0.08);
}

body{
    margin:0;
    font-family:Inter;
    background:var(--bg);
    color:var(--text);
}

/* TOP */
.top{
    position:sticky;
    top:0;
    background:#151525cc;
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
}

.top-inner{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
}

.logo{
    font-weight:800;
    color:var(--primary);
}

/* PROFILE ICON */
.profile-icon{
    width:38px;
    height:38px;
    border-radius:50%;
    border:2px solid var(--primary);
    display:none;
    object-fit:cover;
}

/* LAYOUT */
.layout{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:260px 1fr 320px;
    gap:16px;
    padding:20px;
}

/* CARD */
.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px;
}

/* USERS */
.user{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    cursor:pointer;
    border-radius:10px;
}
.user:hover{background:#2a2350}

/* POSTS */
.post{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
}

.name{
    color:var(--primary);
    font-weight:700;
}

/* CHAT */
#msgs{
    height:360px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.msg{
    padding:8px 10px;
    border-radius:12px;
    max-width:75%;
}

.me{background:var(--primary);align-self:flex-end}
.them{background:#222;align-self:flex-start}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    border:1px solid var(--border);
    background:#111;
    color:#fff;
}

button{
    cursor:pointer;
    border:none;
}

.btn{
    width:100%;
    padding:10px;
    border-radius:10px;
    background:var(--primary);
    color:#fff;
    font-weight:700;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">
<div class="top-inner">

<div class="logo">Testogram</div>

<div style="display:flex;align-items:center;gap:10px;">

<!-- PROFILE ICON -->
<img id="profilePic" class="profile-icon">

<button id="loginBtn" class="btn" style="width:auto;">Войти</button>
<button id="logoutBtn" class="btn" style="width:auto;display:none;">Выйти</button>

</div>

</div>
</div>

<!-- LAYOUT -->
<div class="layout">

<!-- USERS -->
<div class="card">
<h3>Users</h3>
<div id="users"></div>
</div>

<!-- FEED -->
<div>
<div class="card" id="postBox" style="display:none;">
<input id="text">
<input id="img">
<button id="postBtn" class="btn">Post</button>
</div>

<div id="feed"></div>
</div>

<!-- CHAT -->
<div class="card">
<div id="chat" style="display:none;">
<h3 id="chatTitle"></h3>
<div id="msgs"></div>
<input id="msgInput">
<button id="sendBtn" class="btn">Send</button>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
getAuth, GoogleAuthProvider, signInWithPopup,
onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
getFirestore, collection, addDoc, onSnapshot,
query, orderBy, doc, setDoc, serverTimestamp, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCMsArqXBXjYxljZs-1tX0kuOUSIkDDnZA",
authDomain:"andrey-93159.firebaseapp.com",
projectId:"andrey-93159",
storageBucket:"andrey-93159.firebasestorage.app",
messagingSenderId:"979105278949",
appId:"1:979105278949:web:216260e4c80d99d7d29d0c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const provider = new GoogleAuthProvider();

let uid=null;
let chatWith=null;

/* LOGIN */
document.getElementById("loginBtn").onclick=
()=>signInWithPopup(auth,provider);

/* LOGOUT */
document.getElementById("logoutBtn").onclick=
()=>signOut(auth).then(()=>location.reload());

/* AUTH */
onAuthStateChanged(auth, async user=>{
if(!user) return;

uid=user.uid;

document.getElementById("loginBtn").style.display="none";
document.getElementById("logoutBtn").style.display="block";

document.getElementById("profilePic").style.display="block";
document.getElementById("profilePic").src=user.photoURL;

await setDoc(doc(db,"users",uid),{
uid,
name:user.displayName,
photo:user.photoURL
},{merge:true});

document.getElementById("postBox").style.display="block";

loadUsers();
loadFeed();
});

/* USERS */
function loadUsers(){
onSnapshot(collection(db,"users"),snap=>{
const box=document.getElementById("users");
box.innerHTML="";

snap.forEach(u=>{
const d=u.data();
if(d.uid===uid) return;

const div=document.createElement("div");
div.className="user";
div.innerHTML=`<img src="${d.photo}" width="28" style="border-radius:50%"> ${d.name}`;
div.onclick=()=>openChat(d);
box.appendChild(div);
});
});
}

/* CHAT ID */
const chatId=(a,b)=>[a,b].sort().join("_");

/* CHAT */
function openChat(user){
chatWith=user.uid;

document.getElementById("chat").style.display="block";
document.getElementById("chatTitle").innerText="Chat: "+user.name;

onSnapshot(query(collection(db,"conversations",chatId(uid,user.uid),"messages"),orderBy("timestamp")),snap=>{
const box=document.getElementById("msgs");
box.innerHTML="";

snap.forEach(m=>{
const d=m.data();
const isMe=d.from===uid;

box.innerHTML+=`
<div class="msg ${isMe?"me":"them"}">${d.text}</div>
`;
});

box.scrollTop=box.scrollHeight;
});
}

/* SEND */
document.getElementById("sendBtn").onclick=async()=>{
const text=document.getElementById("msgInput").value;
if(!text||!chatWith) return;

await addDoc(
collection(db,"conversations",chatId(uid,chatWith),"messages"),
{
from:uid,
text,
timestamp:serverTimestamp()
}
);

msgInput.value="";
};

/* POSTS */
document.getElementById("postBtn").onclick=async()=>{
await addDoc(collection(db,"requests"),{
name:auth.currentUser.displayName,
text:text.value,
image:img.value,
reactions:{like:0},
timestamp:serverTimestamp()
});

text.value="";
img.value="";
};

/* FEED */
function loadFeed(){
onSnapshot(query(collection(db,"requests"),orderBy("timestamp","desc")),snap=>{
const feed=document.getElementById("feed");
feed.innerHTML="";

snap.forEach(d=>{
const p=d.data();

feed.innerHTML+=`
<div class="post">
<div class="name">${p.name}</div>
<div>${p.text||""}</div>
${p.image?`<img src="${p.image}">`:""}
</div>`;
});
});
}
</script>

</body>
</html>
