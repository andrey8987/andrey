<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testogram</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #7c4dff;
    --primary-hover: #6a3de8;
    --bg: #f3f0ff;
    --card: #ffffff;
    --text-main: #1f1f2e;
    --text-muted: #8a8aa3;
    --radius: 16px;
    --shadow: rgba(124, 77, 255, 0.15);
}

body.dark {
    --primary: #9d7bff;
    --primary-hover: #8b6cf0;
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --text-main: #e4e4ff;
    --text-muted: #9a9ab0;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    margin: 0;
}

/* HEADER */
.top-nav {
    background: var(--card);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    box-shadow: 0 2px 10px var(--shadow);
}

.logo {
    font-weight: 700;
    font-size: 22px;
    color: var(--primary);
}

/* GRID */
.main-layout {
    display: grid;
    grid-template-columns: 320px 1fr 260px;
    gap: 24px;
    padding: 20px;
}

/* CARDS */
.container {
    background: var(--card);
    border-radius: 20px;
    padding: 16px;
    box-shadow: 0 6px 20px var(--shadow);
}

/* POSTS */
.post {
    margin-bottom: 16px;
    padding: 16px;
    border-radius: 20px;
    background: linear-gradient(145deg, #ffffff, #f3f0ff);
}

.post img {
    width: 100%;
    border-radius: 14px;
}

/* BUTTON */
.btn-primary {
    background: linear-gradient(135deg, #7c4dff, #b388ff);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
}

/* CHAT */
#chatMessages {
    height: 350px;
    overflow-y: auto;
}

.msg {
    padding: 10px;
    margin: 6px 0;
    border-radius: 12px;
    max-width: 70%;
}

.msg-me {
    background: linear-gradient(135deg, #7c4dff, #b388ff);
    color: white;
    margin-left: auto;
}

.msg-them {
    background: #eee;
}

/* USERS */
.user-item {
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.user-item:hover {
    background: #ede7ff;
}

.user-item.active {
    background: linear-gradient(135deg, #7c4dff, #b388ff);
    color: white;
}
</style>
</head>

<body>

<div class="top-nav">
    <div class="logo">Testogram</div>
    <button id="themeToggle">🌙</button>
</div>

<div class="main-layout">

    <!-- ЧАТ -->
    <div class="chat-sidebar">
        <div id="chatBox" class="container">
            <div id="chatMessages"></div>
            <input id="chatInput">
            <button id="sendChatBtn" class="btn-primary">🚀</button>
        </div>
    </div>

    <!-- ЛЕНТА -->
    <div>
        <div class="container">
            <input id="contentInput" placeholder="Что нового?">
            <input id="imageUrlInput" placeholder="Ссылка на фото">
            <button id="mainBtn" class="btn-primary">Опубликовать</button>
        </div>
        <div id="feed"></div>
    </div>

    <!-- ПОЛЬЗОВАТЕЛИ -->
    <div class="container">
        <div id="userList"></div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMsArqXBXjYxljZs-1tX0kuOUSIkDDnZA",
  authDomain: "andrey-93159.firebaseapp.com",
  projectId: "andrey-93159"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const provider = new GoogleAuthProvider();

onAuthStateChanged(auth, user => {
    if (!user) signInWithPopup(auth, provider);
});

document.getElementById("mainBtn").onclick = async () => {
    const text = contentInput.value;
    const img = imageUrlInput.value;

    await addDoc(collection(db, "posts"), {
        text, img
    });

    contentInput.value = "";
    imageUrlInput.value = "";
};

onSnapshot(collection(db, "posts"), snap => {
    feed.innerHTML = "";
    snap.forEach(doc => {
        const p = doc.data();
        feed.innerHTML += `
        <div class="post">
            ${p.text}
            ${p.img ? `<img src="${p.img}">` : ""}
        </div>`;
    });
});

/* THEME */
themeToggle.onclick = () => {
    document.body.classList.toggle("dark");
};
</script>

</body>
</html>
