<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testogram</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #7c3aed;
    --primary-hover: #6d28d9;
    --bg: #0f0f17;
    --card: #171726;
    --text-main: #f2f2f7;
    --text-muted: #a1a1aa;
    --border: rgba(255,255,255,0.08);
    --radius: 16px;
    --shadow: rgba(0,0,0,0.4);
}

body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: radial-gradient(circle at top, #1a1530, #0f0f17);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* TOP */
.top-nav {
    width: 100%;
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(20,20,35,0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
}

.nav-content {
    max-width: 1200px;
    margin: auto;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-weight: 800;
    font-size: 22px;
    color: var(--primary);
}

/* LAYOUT */
.main-layout {
    width: 100%;
    max-width: 1200px;
    display: grid;
    grid-template-columns: 260px 1fr 300px;
    gap: 18px;
    padding: 20px;
}

/* CARDS */
.container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: 0 10px 30px var(--shadow);
}

/* PROFILE */
.user-card {
    text-align: center;
}

.user-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--primary);
    margin-bottom: 10px;
}

/* USERS */
.user-item {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

.user-item:hover {
    background: rgba(124,58,237,0.15);
}

.user-item.active {
    background: var(--primary);
}

/* POSTS */
.post {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    transition: 0.2s;
}

.post:hover {
    transform: translateY(-2px);
}

.author-name {
    color: var(--primary);
    font-weight: 700;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #111122;
    color: white;
    outline: none;
}

input:focus {
    border-color: var(--primary);
}

/* BUTTON */
.btn-primary {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: var(--primary);
    color: white;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
}

.btn-primary:hover {
    background: var(--primary-hover);
}

/* CHAT */
#chatMessages {
    height: 380px;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.msg {
    padding: 10px;
    border-radius: 14px;
    max-width: 75%;
}

.msg-me {
    background: var(--primary);
    align-self: flex-end;
}

.msg-them {
    background: #22223a;
    align-self: flex-start;
}

/* REACTIONS */
.reactions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.react-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-main);
    padding: 6px 10px;
    border-radius: 10px;
    cursor: pointer;
}

.react-btn:hover {
    border-color: var(--primary);
}

/* RESPONSIVE */
@media(max-width: 1000px){
    .main-layout {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="top-nav">
    <div class="nav-content">
        <div class="logo">Testogram</div>
        <div>
            <button id="loginBtn" class="btn-primary" style="width:auto;">Войти</button>
        </div>
    </div>
</div>

<div class="main-layout">

    <div class="container sidebar">
        <div class="user-card" id="myProfile" style="display:none;">
            <img id="userPhoto" class="user-avatar">
            <h3 id="userName"></h3>
        </div>

        <div class="section-title">Пользователи</div>
        <div id="userList">...</div>
    </div>

    <div>
        <div id="postForm" class="container" style="display:none;">
            <input id="contentInput" placeholder="Что нового?">
            <input id="imageUrlInput" placeholder="Фото URL">
            <button id="mainBtn" class="btn-primary">Опубликовать</button>
        </div>

        <div id="feed"></div>
    </div>

    <div class="container">
        <div id="chatBox" style="display:none;">
            <div id="chatHeader"></div>
            <div id="chatMessages"></div>
            <input id="chatInput" placeholder="Сообщение">
            <button id="sendChatBtn" class="btn-primary">Отправить</button>
        </div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMsArqXBXjYxljZs-1tX0kuOUSIkDDnZA",
  authDomain: "andrey-93159.firebaseapp.com",
  projectId: "andrey-93159",
  storageBucket: "andrey-93159.firebasestorage.app",
  messagingSenderId: "979105278949",
  appId: "1:979105278949:web:216260e4c80d99d7d29d0c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUID = null;
let activeChatUID = null;

const provider = new GoogleAuthProvider();

document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);

onAuthStateChanged(auth, async user => {
    if(!user) return;

    currentUID = user.uid;

    await setDoc(doc(db,"users",user.uid),{
        uid:user.uid,
        name:user.displayName,
        photo:user.photoURL
    },{merge:true});

    document.getElementById("myProfile").style.display="block";
    document.getElementById("userName").innerText=user.displayName;
    document.getElementById("userPhoto").src=user.photoURL;
    document.getElementById("postForm").style.display="block";

    listenUsers();
});

function listenUsers(){
    onSnapshot(collection(db,"users"),snap=>{
        const list=document.getElementById("userList");
        list.innerHTML="";
        snap.forEach(u=>{
            const data=u.data();
            if(data.uid===currentUID) return;

            const div=document.createElement("div");
            div.className="user-item";
            div.innerHTML=`<img src="${data.photo}" width="30"> ${data.name}`;
            div.onclick=()=>startChat(data);
            list.appendChild(div);
        });
    });
}

function startChat(user){
    activeChatUID=user.uid;
    document.getElementById("chatBox").style.display="block";
    document.getElementById("chatHeader").innerText="Чат с "+user.name;
}

document.getElementById("mainBtn").onclick=async()=>{
    await addDoc(collection(db,"requests"),{
        name:auth.currentUser.displayName,
        text:contentInput.value,
        imageUrl:imageUrlInput.value,
        reactions:{like:0,fire:0,laugh:0},
        timestamp:serverTimestamp()
    });
};

onSnapshot(query(collection(db,"requests"),orderBy("timestamp","desc")),snap=>{
    const feed=document.getElementById("feed");
    feed.innerHTML="";
    snap.forEach(d=>{
        const p=d.data();
        feed.innerHTML+=`
        <div class="post">
            <div class="author-name">${p.name}</div>
            <div>${p.text||""}</div>
            ${p.imageUrl?`<img src="${p.imageUrl}" width="100%">`:""}
        </div>`;
    });
});
</script>

</body>
</html>
